<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Profile card component</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/style.css">

</head>

<body>
  <main>
    <img class="top-bg-img background" src="images/bg-pattern-top.svg" alt="">
    <img class="bottom-bg-img background" src="images/bg-pattern-bottom.svg" alt="">
    <div class="main-card">
      <div class="background-img">
        <img src="images/bg-pattern-card.svg" alt="">
      </div>
      <div class="profile-img">
        <img src="images/image-victor.jpg" alt="">
      </div>
      <section class="profile-data">
        <div class="header-data">
          <div class="name-and-age">
            <h2>Victor Crest</h2>
            <p>26</p>
          </div>
          <p>London</p>
        </div>
        <div class="footer-data">
          <div class="followers data">
            <h2>80K</h2>
            <p>Followers</p>
          </div>
          <div class="likes data">
            <h2>803K</h2>
            <p>Likes</p>
          </div>
          <div class="photos data">
            <h2>1.4K</h2>
            <p>Photos</p>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>

</html>
